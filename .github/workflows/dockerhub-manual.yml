name: Docker Hub Manual Build

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: "Docker Hub 仓库名（不含用户名）"
        required: true
        default: "sub2api-main"
        type: string
      image_tag:
        description: "镜像标签"
        required: true
        default: "latest"
        type: string
      push_latest:
        description: "额外推送 latest 标签"
        required: false
        default: false
        type: boolean
      platforms:
        description: "构建平台"
        required: true
        default: "linux/amd64"
        type: string

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare build metadata
        id: meta_prep
        shell: bash
        run: |
          version="${{ github.event.inputs.image_tag }}"
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.inputs.image_name }}
          tags: |
            type=raw,value=${{ github.event.inputs.image_tag }}
            type=raw,value=latest,enable=${{ github.event.inputs.push_latest }}
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ github.event.inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta_prep.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta_prep.outputs.date }}
